services:
  postgres:
    image: postgres:16-alpine
    container_name: waves-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: waves
      POSTGRES_USER: waves
      POSTGRES_PASSWORD: waves_dev_password
    ports:
      - "5432:5432"
    volumes:
      - waves-postgres-data:/var/lib/postgresql/data

volumes:
  waves-postgres-data:
